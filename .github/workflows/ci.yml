name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Run linting
        run: docker compose exec -T app make check

      - name: Run tests
        run: docker compose exec -T app make test
