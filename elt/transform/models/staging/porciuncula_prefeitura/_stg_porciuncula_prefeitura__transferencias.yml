version: 2

models:
  - name: stg_porciuncula_prefeitura__transferencias
    description: "Transferências do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: mes
        data_type: text
      - name: entidade_pagadora
        data_type: text
      - name: entidade_recebedora
        data_type: text
      - name: repasse
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "repasse is not null"
      - name: devolucao
        data_type: numeric
