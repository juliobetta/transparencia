version: 2

models:
  - name: stg_porciuncula_prefeitura__receita_orcamentaria
    description: "Receitas orçamentárias do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: codigo
        data_type: text
      - name: descricao
        data_type: text
      - name: previsao_atualizada
        data_type: numeric
      - name: arrecadado_efetivo
        data_type: numeric
