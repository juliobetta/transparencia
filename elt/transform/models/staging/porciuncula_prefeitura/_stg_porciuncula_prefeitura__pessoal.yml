version: 2

models:
  - name: stg_porciuncula_prefeitura__pessoal
    description: "Pessoal do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: proventos
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "proventos is not null"
      - name: categoria_funcional
        data_type: text
      - name: vinculo
        data_type: text
      - name: cargo
        data_type: text
      - name: forma_provimento
        data_type: text
