version: 2

models:
  - name: stg_porciuncula_prefeitura__diarias
    description: "Diárias do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: diaria_id
        data_type: text
      - name: valor
        data_type: numeric
      - name: favorecido
        data_type: text
      - name: cargo
        data_type: text
      - name: data
        data_type: date
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'2010-01-01'::date"
              max_value: "'2040-12-31'::date"
              row_condition: "data is not null"
      - name: unidade
        data_type: text
      - name: descricao
        data_type: text
