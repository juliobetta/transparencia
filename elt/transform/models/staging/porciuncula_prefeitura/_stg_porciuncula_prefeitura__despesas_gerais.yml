version: 2

models:
  - name: stg_porciuncula_prefeitura__despesas_gerais
    description: "Despesas do exercício do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: empenho_id
        data_type: text
      - name: pk_empenho
        data_type: text
      - name: pk_empenho_pai
        data_type: text
      - name: tipo_empenho
        data_type: text
      - name: orgao_codigo
        data_type: text
      - name: funcao
        data_type: text
      - name: funcao_nome
        data_type: text
      - name: subfuncao
        data_type: text
      - name: subfuncao_nome
        data_type: text
      - name: elemento
        data_type: text
      - name: natureza_despesa
        data_type: text
      - name: categoria
        data_type: text
      - name: grupo_natureza
        data_type: text
      - name: modalidade
        data_type: text
      - name: programa
        data_type: text
      - name: programa_nome
        data_type: text
      - name: proj_atividade
        data_type: text
      - name: projeto_atividade_nome
        data_type: text
      - name: mes
        data_type: text
      - name: fornecedor_nome
        data_type: text
      - name: fornecedor_cpf_cnpj
        data_type: text
      - name: fornecedor_raw
        data_type: text
      - name: licitacao_numero
        data_type: text
      - name: licitacao_modalidade
        data_type: text
      - name: licitacao_descricao
        data_type: text
      - name: fongrupo
        data_type: text
      - name: fongrupo_desc
        data_type: text
      - name: foncodigo
        data_type: text
      - name: foncodigo_desc
        data_type: text
      - name: fonro
        data_type: text
      - name: fonro_desc
        data_type: text
      - name: fonte_stn
        data_type: text
      - name: fonte_stn_desc
        data_type: text
      - name: fonte_recurso_desc
        data_type: text
      - name: data_empenho
        data_type: date
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'2010-01-01'::date"
              max_value: "'2040-12-31'::date"
              row_condition: "data_empenho is not null"
      - name: empenhado
        data_type: numeric
      - name: liquidado
        data_type: numeric
      - name: pago
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "pago is not null"
      - name: dotacao_inicial
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "dotacao_inicial is not null"
      - name: alteracao_dotacao
        data_type: numeric
      - name: dotacao_atualizada
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "dotacao_atualizada is not null"
      - name: anulado
        data_type: numeric
      - name: reforco
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "reforco is not null"
      - name: descricao
        data_type: text
      - name: entidade_nome
        data_type: text
      - name: proc
        data_type: text
      - name: codlo
        data_type: text
      - name: cfpro
        data_type: text
      - name: ficha
        data_type: text
      - name: codif
        data_type: text
      - name: codigo
        data_type: text
      - name: produ
        data_type: text
      - name: vingrupo_vincodigo
        data_type: text
      - name: vincodigonome
        data_type: text
