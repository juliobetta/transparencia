          - name: codigo
          - name: mes
          - name: entidade_pagadora
          - name: entidade_recebedora
          - name: repasse
          - name: devolucao

      - name: metadata
        description: "Metadados do pipeline ELT (ex: data da última extração)"
        meta:
          primary_key: [portal_slug, key]
        columns:
          - name: portal_slug
          - name: key
          - name: value

      - name: empresas
        description: "Entidades/órgãos do portal"
        meta:
          primary_key: [id]
        columns:
