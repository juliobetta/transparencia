version: 2

models:
  - name: stg_porciuncula_prefeitura__licitacoes
    description: "Licitações do portal Porciúncula Prefeitura — casts e renomeação de colunas"
    columns:
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2010
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: licitacao_numero
        data_type: text
      - name: modalidade
        data_type: text
      - name: objeto
        data_type: text
      - name: discriminacao
        data_type: text
      - name: valor
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "valor is not null"
      - name: data_abertura
        data_type: date
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: "'2010-01-01'::date"
              max_value: "'2040-12-31'::date"
              row_condition: "data_abertura is not null"
      - name: carona
        data_type: text
