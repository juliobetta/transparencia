version: 2

models:
  - name: fct_receitas
    description: "Fato de receitas consolidadas (orçamentária, união e estado) de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: receita_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | tipo_receita | codigo)"
        tests:
          - not_null
          - unique
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: tipo_receita
        data_type: text
        description: "'orcamentaria', 'uniao' ou 'estado'"
        tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['orcamentaria', 'uniao', 'estado']
      - name: codigo
        data_type: text
      - name: descricao
        data_type: text
      - name: previsao_atualizada
        data_type: numeric
      - name: arrecadado
        data_type: numeric
