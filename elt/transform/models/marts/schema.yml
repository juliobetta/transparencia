version: 2

models:
  - name: fct_despesas
    description: "Fato de despesas consolidadas com empenho líquido calculado (exclui anulações do fluxo principal)"
    config:
      contract:
        enforced: true
    columns:
      - name: despesa_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | empenho_id)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: fonte
        data_type: text
        description: "'exercicio' para despesas do orçamento corrente, 'restos_a_pagar' para execução de empenhos de anos anteriores"
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: empenho_id
        data_type: text
        constraints:
          - type: not_null
      - name: pk_empenho
        data_type: text
      - name: tipo_empenho
        data_type: text
        description: "OR=Ordinário, ES=Estimativo, GL=Global (anulações AN excluídas desta tabela)"
      - name: orgao_codigo
        data_type: text
      - name: funcao
        data_type: text
      - name: funcao_nome
        data_type: text
      - name: subfuncao
        data_type: text
      - name: subfuncao_nome
        data_type: text
      - name: elemento
        data_type: text
      - name: natureza_despesa
        data_type: text
      - name: grupo_natureza
        data_type: text
      - name: modalidade
        data_type: text
      - name: programa
        data_type: text
      - name: programa_nome
        data_type: text
      - name: proj_atividade
        data_type: text
      - name: projeto_atividade_nome
        data_type: text
      - name: mes
        data_type: text
      - name: fornecedor_nome
        data_type: text
      - name: fornecedor_cpf_cnpj
        data_type: text
      - name: licitacao_numero
        data_type: text
      - name: licitacao_modalidade
        data_type: text
      - name: fonte_recurso_desc
        data_type: text
      - name: descricao
        data_type: text
      - name: credor_id
        data_type: text
      - name: orgao_id
        data_type: text
      - name: data_empenho
        data_type: date
      - name: empenhado
        data_type: numeric
      - name: empenhado_liquido
        data_type: numeric
        description: "Empenhado bruto + anulações (valores negativos). Denominador correto para taxas de quitação."
      - name: liquidado
        data_type: numeric
      - name: pago
        data_type: numeric
      - name: dotacao_inicial
        data_type: numeric
      - name: alteracao_dotacao
        data_type: numeric
      - name: dotacao_atualizada
        data_type: numeric
      - name: reforco
        data_type: numeric
      - name: valor_anulacoes
        data_type: numeric

  - name: dim_credor
    description: "Credores/fornecedores únicos por portal"
    config:
      contract:
        enforced: true
    columns:
      - name: credor_id
        data_type: text
        constraints:
          - type: not_null
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: fornecedor_cpf_cnpj
        data_type: text
      - name: fornecedor_nome
        data_type: text

  - name: dim_orgao
    description: "Entidades municipais (prefeitura + fundos) por portal"
    config:
      contract:
        enforced: true
    columns:
      - name: orgao_id
        data_type: text
        constraints:
          - type: not_null
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: orgao_nome
        data_type: text

  - name: dim_date
    description: "Dimensão calendário diário de 2021 a 2035"
    config:
      contract:
        enforced: true
    columns:
      - name: data
        data_type: date
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: mes_num
        data_type: integer
      - name: dia
        data_type: integer
      - name: dia_semana
        data_type: integer
      - name: mes_nome
        data_type: text
      - name: inicio_mes
        data_type: date
      - name: fim_mes
        data_type: date
      - name: trimestre
        data_type: integer

  - name: fct_receitas
    description: "Fato de receitas consolidadas (orçamentária, união e estado) de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: receita_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | tipo_receita | codigo)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: tipo_receita
        data_type: text
        description: "'orcamentaria', 'uniao' ou 'estado'"
      - name: codigo
        data_type: text
      - name: descricao
        data_type: text
      - name: previsao_atualizada
        data_type: numeric
      - name: arrecadado
        data_type: numeric

  - name: fct_licitacoes
    description: "Fato de licitações consolidadas de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: licitacao_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | licitacao_numero)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: licitacao_numero
        data_type: text
      - name: modalidade
        data_type: text
      - name: objeto
        data_type: text
      - name: discriminacao
        data_type: text
      - name: valor
        data_type: numeric
      - name: data_abertura
        data_type: date
      - name: carona
        data_type: text

  - name: fct_contratos
    description: "Fato de contratos consolidados de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: contrato_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | contrato_numero)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: contrato_numero
        data_type: text
      - name: fornecedor_nome
        data_type: text
      - name: objeto
        data_type: text
      - name: valor_contrato
        data_type: numeric
      - name: licitacao_numero
        data_type: text
      - name: mes
        data_type: text
      - name: tipo_obra
        data_type: text
      - name: numero_obra
        data_type: text
      - name: empenhado
        data_type: numeric

  - name: fct_diarias
    description: "Fato de diárias consolidadas de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | diaria_id)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: diaria_id
        data_type: text
      - name: valor
        data_type: numeric
      - name: favorecido
        data_type: text
      - name: cargo
        data_type: text
      - name: data
        data_type: date
      - name: unidade
        data_type: text
      - name: descricao
        data_type: text

  - name: fct_pessoal
    description: "Fato de pessoal consolidado de todos os portais (sem chave única por linha)"
    config:
      contract:
        enforced: true
    columns:
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: proventos
        data_type: numeric
      - name: categoria_funcional
        data_type: text
      - name: vinculo
        data_type: text
      - name: cargo
        data_type: text
      - name: forma_provimento
        data_type: text

  - name: fct_transferencias
    description: "Fato de transferências consolidadas de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: transferencia_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | mes | entidade_pagadora | entidade_recebedora)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: mes
        data_type: text
      - name: entidade_pagadora
        data_type: text
      - name: entidade_recebedora
        data_type: text
      - name: repasse
        data_type: numeric
      - name: devolucao
        data_type: numeric

  - name: fct_emendas
    description: "Fato de emendas parlamentares consolidadas de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: emenda_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | numero_emenda)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: numero_emenda
        data_type: text
      - name: resumo
        data_type: text
      - name: valor_total
        data_type: numeric
      - name: empenhado
        data_type: numeric
      - name: autor
        data_type: text
      - name: tipo_emenda
        data_type: text
      - name: esfera_origem
        data_type: text
      - name: ato_normativo
        data_type: text
      - name: destinacao
        data_type: text
