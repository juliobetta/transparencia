version: 2

models:
  - name: fct_despesas_por_fornecedor
    description: "Despesas agregadas por fornecedor, lidas da tabela raw do portal e com cast numérico nos valores financeiros"
    columns:
      - name: empresa
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
      - name: codigo
        data_type: text
      - name: descricao
        data_type: text
      - name: fornecedor_cpf_cnpj
        data_type: text
      - name: fornecedor_cidade
        data_type: text
      - name: empenhado
        data_type: numeric
      - name: liquidado
        data_type: numeric
      - name: pago
        data_type: numeric
