version: 2

models:
  - name: fct_diarias
    description: "Fato de diárias consolidadas de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | diaria_id)"
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: diaria_id
        data_type: text
      - name: valor
        data_type: numeric
      - name: favorecido
        data_type: text
      - name: cargo
        data_type: text
      - name: data
        data_type: date
      - name: unidade
        data_type: text
      - name: descricao
        data_type: text
