version: 2

models:
  - name: dim_date
    description: "Dimensão calendário diário de 2021 a 2035"
    config:
      contract:
        enforced: true
    columns:
      - name: data
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null
          - unique
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: mes_num
        data_type: integer
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 12
      - name: dia
        data_type: integer
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 31
      - name: dia_semana
        data_type: integer
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 6
      - name: mes_nome
        data_type: text
      - name: inicio_mes
        data_type: date
      - name: fim_mes
        data_type: date
      - name: trimestre
        data_type: integer
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 4
