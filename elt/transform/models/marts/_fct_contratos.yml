version: 2

models:
  - name: fct_contratos
    description: "Fato de contratos consolidados de todos os portais"
    config:
      contract:
        enforced: true
    columns:
      - name: contrato_id
        data_type: text
        constraints:
          - type: not_null
        description: "Chave surrogate MD5 (portal_slug | ano | empresa_id | contrato_numero)"
        tests:
          - not_null
          - unique
      - name: portal_slug
        data_type: text
        constraints:
          - type: not_null
      - name: ano
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2000
              max_value: 2035
      - name: empresa_id
        data_type: text
        constraints:
          - type: not_null
      - name: contrato_numero
        data_type: text
      - name: fornecedor_nome
        data_type: text
      - name: objeto
        data_type: text
      - name: valor_contrato
        data_type: numeric
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              row_condition: "valor_contrato is not null"
      - name: licitacao_numero
        data_type: text
      - name: modalidade
        data_type: text
      - name: mes
        data_type: text
      - name: tipo_obra
        data_type: text
      - name: numero_obra
        data_type: text
      - name: fundlegal
        data_type: text
      - name: empenhado
        data_type: numeric
