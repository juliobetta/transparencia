version: 2

models:
  - name: int_transferencias_consolidadas
    description: "Transferências consolidadas de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: mes
        data_type: text
      - name: entidade_pagadora
        data_type: text
      - name: entidade_recebedora
        data_type: text
      - name: repasse
        data_type: numeric
      - name: devolucao
        data_type: numeric
