version: 2

models:
  - name: int_receitas_consolidadas
    description: "Receitas consolidadas de todos os portais via union all (orçamentária, união, estado)"
    columns:
      - name: portal_slug
        data_type: text
      - name: tipo_receita
        data_type: text
      - name: ano
        data_type: integer
      - name: empresa_id
        data_type: text
      - name: codigo
        data_type: text
      - name: descricao
        data_type: text
      - name: previsao_atualizada
        data_type: numeric
      - name: arrecadado_efetivo
        data_type: numeric
