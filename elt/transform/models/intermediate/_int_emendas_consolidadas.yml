version: 2

models:
  - name: int_emendas_consolidadas
    description: "Emendas parlamentares consolidadas de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: numero_emenda
        data_type: text
      - name: resumo
        data_type: text
      - name: valor_total
        data_type: numeric
      - name: empenhado
        data_type: numeric
      - name: autor
        data_type: text
      - name: tipo_emenda
        data_type: text
      - name: esfera_origem
        data_type: text
      - name: ato_normativo
        data_type: text
      - name: destinacao
        data_type: text
