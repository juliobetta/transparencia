version: 2

models:
  - name: int_licitacoes_consolidadas
    description: "Licitações consolidadas de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2010
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: licitacao_numero
        data_type: text
      - name: modalidade
        data_type: text
      - name: objeto
        data_type: text
      - name: discriminacao
        data_type: text
      - name: valor
        data_type: numeric
      - name: data_abertura
        data_type: date
      - name: carona
        data_type: text
