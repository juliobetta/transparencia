version: 2

models:
  - name: int_contratos_consolidados
    description: "Contratos consolidados de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2000
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: contrato_numero
        data_type: text
      - name: fornecedor_nome
        data_type: text
      - name: objeto
        data_type: text
      - name: valor_contrato
        data_type: numeric
      - name: licitacao_numero
        data_type: text
      - name: mes
        data_type: text
      - name: tipo_obra
        data_type: text
      - name: numero_obra
        data_type: text
      - name: empenhado
        data_type: numeric
