version: 2

models:
  - name: int_diarias_consolidadas
    description: "Diárias consolidadas de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
      - name: ano
        data_type: integer
      - name: empresa_id
        data_type: text
      - name: diaria_id
        data_type: text
      - name: valor
        data_type: numeric
      - name: favorecido
        data_type: text
      - name: cargo
        data_type: text
      - name: data
        data_type: date
      - name: unidade
        data_type: text
      - name: descricao
        data_type: text
