version: 2

models:
  - name: int_diarias_consolidadas
    description: "Diárias consolidadas de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: diaria_id
        data_type: text
      - name: valor
        data_type: numeric
      - name: favorecido
        data_type: text
      - name: cargo
        data_type: text
      - name: data
        data_type: date
      - name: unidade
        data_type: text
      - name: descricao
        data_type: text
