version: 2

models:
  - name: int_pessoal_consolidado
    description: "Pessoal consolidado de todos os portais via union all"
    columns:
      - name: portal_slug
        data_type: text
        tests:
          - not_null
      - name: ano
        data_type: integer
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 2015
              max_value: 2035
      - name: empresa_id
        data_type: text
        tests:
          - not_null
      - name: proventos
        data_type: numeric
      - name: categoria_funcional
        data_type: text
      - name: vinculo
        data_type: text
      - name: cargo
        data_type: text
      - name: forma_provimento
        data_type: text
